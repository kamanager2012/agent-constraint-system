# HACS (Hermes) hook configuration snippet
# Append to ~/.hermes/config.yaml

hooks:
  pre_tool_call:
    - matcher: "terminal"
      command: "python3 ~/.hermes/agent-hooks/hacs.py"
      timeout: 10
    - matcher: "write_file|patch"
      command: "python3 ~/.hermes/agent-hooks/hacs.py"
      timeout: 10
  post_tool_call:
    - matcher: "terminal|write_file|patch"
      command: "python3 ~/.hermes/agent-hooks/hacs.py"
      timeout: 10
  on_session_start:
    - command: "python3 ~/.hermes/agent-hooks/hacs.py"
      timeout: 5
  on_session_end:
    - command: "python3 ~/.hermes/agent-hooks/hacs.py"
      timeout: 5

# Optional: auto-accept hooks without first-use consent prompt
# hooks_auto_accept: true
